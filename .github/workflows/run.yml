name: Keep Bot Alive
on:
  schedule:
    - cron: '*/5 * * * *' # pings every 5 mins
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: npm start
