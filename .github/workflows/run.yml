name: Run Deriv Bot
on:
  workflow_dispatch: # this adds the "Run workflow" button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          DERIV_TOKEN: ${{ secrets.DERIV_TOKEN }}
          DERIV_APP_ID: 1089
        run: python bot.py
